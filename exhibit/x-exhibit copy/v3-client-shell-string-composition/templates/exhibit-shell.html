<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js" defer></script>

    <script src="https://cdn.jsdelivr.net/npm/fuse.js/dist/fuse.min.js"></script>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
    />

    <!-- your globals -->
    <script src="/react.js"></script>
    <script src="/reactdom.js"></script>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }

      :root {
        /* ✅ keep RGB channels only (correct format for Tailwind alpha) */
        --bg: 255 255 255;
        --fg: 15 15 15;
        /* optional extra tokens for your UI system */
        --muted: 120 120 120;
        --accent: 34 197 94;
      }

      :root[data-theme='dark'] {
        --bg: 9 9 11;
        --fg: 255 255 255;
        --muted: 161 161 170;
        --accent: 59 130 246;
      }

      body {
        background: rgb(var(--bg));
        color: rgb(var(--fg));
        transition:
          background 0.2s ease,
          color 0.2s ease;
      }

      /* 🔥 IMPORTANT: enables Tailwind rgb(var(--x) / alpha) usage smoothly */
      #root {
        color-scheme: dark light;
      }
      /* Error Overlay Design - Saves DOM structure from destruction */
      #error-overlay {
        position: fixed;
        inset: 0;
        background: rgba(9, 9, 11, 0.95);
        color: #ef4444;
        padding: 24px;
        font-family: monospace;
        font-size: 14px;
        line-height: 1.5;
        overflow: auto;
        z-index: 99999;
        display: none;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <div
      id="error-overlay"
      style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999"
    ></div>
    <script>
      const reportError = (err) => {
        console.error('Module System Error:', err);
        // Send to parent so you can see it in the UI console
        window.parent.postMessage({ type: 'iframe:error', payload: { message: err.message, stack: err.stack } }, '*');
      };
      function resolveModulePath(from, request) {
        // external deps stay untouched
        if (!request.startsWith('.')) return request;

        const stack = from.split('/');
        stack.pop(); // remove file name

        const parts = request.split('/');

        for (const part of parts) {
          if (part === '.' || part === '') continue;
          if (part === '..') stack.pop();
          else stack.push(part);
        }

        let resolved = stack.join('/');

        // extension resolution
        const candidates = [
          resolved,
          resolved + '.tsx',
          resolved + '.ts',
          resolved + '.js',
          resolved + '/index.tsx',
          resolved + '/index.ts',
          resolved + '/index.js',
        ];

        return candidates;
      }
      // =========================================================================
      // 1. DYNAMIC DEPENDENCY RESOLVER
      // =========================================================================
      const getExternalDep = (name) => {
        const deps = {
          react: window.React,
          'react-dom': window.ReactDOM,
          'lucide-react': window.lucide,
          lucide: window.lucide,
        };
        return deps[name];
      };

      window.clearErrorOverlay = () => {
        const overlay = document.getElementById('error-overlay');
        if (overlay) {
          overlay.innerHTML = ''; // Remove the text
          overlay.style.display = 'none'; // Hide the box
          overlay.style.pointerEvents = 'none'; // Ensure you can click the app again
        }
      };

      window.AppCore = {
        root: null, // Encapsulate root here
        onError: (error, babelError) => {
          const overlay = document.getElementById('error-overlay');
          Object.assign(overlay.style, {
            position: 'fixed',
            top: '0',
            left: '0',
            width: '100vw',
            height: '100vh',
            zIndex: '999999',
            pointerEvents: 'all',
            backgroundColor: 'rgba(0, 0, 0, 0.85)',
            display: 'flex',
          });

          // 3. Assign it once
          overlay.innerHTML = error;
        },
        ensureRoot: () => {
          if (!window.AppCore.root) {
            const rootEl =
              document.getElementById('root') ||
              document.body.appendChild(Object.assign(document.createElement('div'), { id: 'root' }));
            window.AppCore.root = ReactDOM.createRoot(rootEl);
          }
          return window.AppCore.root;
        },

        render: (path) => {
          try {
            const mod = customRequire(path);
            const root = window.AppCore.ensureRoot();
            root.render(window.React.createElement(mod.default || mod));
            window.clearErrorOverlay();
            return true;
          } catch (err) {
            // DO NOT root.render(...) here.
            // Just notify the parent. The parent's console drawer will handle the error.
            window.parent.postMessage(
              {
                type: 'iframe:error',
                payload: { message: err.message, stack: err.stack, loc: err.loc },
              },
              '*',
            );
            return false;
          }
        },

        syncRegistry: (files) => {
          window.moduleRegistry = {};
          Object.entries(files || {}).forEach(([path, file]) => {
            try {
              const transformed = Babel.transform(file.content, {
                presets: ['react', 'env'],
                plugins: ['transform-modules-commonjs'],
              }).code;

              window.moduleRegistry[path] = {
                exports: {},
                factory: new Function('exports', 'require', 'module', transformed),
                wasExecuted: false,
              };
            } catch (babelError) {
              console.error(`Babel Error in ${path}:`, babelError);

              const rootEl = document.getElementById('root');
              if (rootEl) {
                const error = `<pre style="color: #ff5555; padding: 20px; font-family: monospace;" className='fixed top-0 left-0 w-full h-full bg-surface'>Syntax Error in ${path}:${babelError.loc ? `\nLine ${babelError.loc.line}` : ''}\n${babelError.message}</pre>`;
                window.AppCore.onError(error, babelError);
              }
              window.parent.postMessage(
                {
                  type: 'iframe:error',
                  payload: { message: babelError.message, loc: babelError.loc, babelMessage: babelError.message },
                },
                '*',
              );

              throw babelError;
            }
          });
        },
      };

      // =========================================================================
      // 3. UPDATED CUSTOM REQUIRE
      // =========================================================================
      function customRequire(modulePath) {
        if (!modulePath) return {};

        // 1. External Deps
        const external = getExternalDep(modulePath);
        if (external) return external;

        // 2. Normalize and Search
        // Remove ./ prefix if it exists, and ensure no leading slash
        const normalized = modulePath.replace(/^\.\//, '').replace(/^\//, '');

        const registryKey = Object.keys(window.moduleRegistry).find((k) => {
          const cleanKey = k.replace(/^\.\//, '').replace(/^\//, '');
          return cleanKey === normalized || cleanKey === normalized + '.tsx' || cleanKey === normalized + '.ts';
        });

        const mod = window.moduleRegistry[registryKey];

        if (!mod) {
          throw new Error(
            `Cannot resolve module: '${modulePath}'. Available: ${Object.keys(window.moduleRegistry).join(', ')}`,
          );
        }

        if (!mod.wasExecuted) {
          mod.factory(mod.exports, customRequire, mod);
          mod.wasExecuted = true;
        }
        return mod.exports;
      }
    </script>

    <script>
      let ENTRY_PATH = './hello-world/page.tsx';
      let root = null;
      window.moduleRegistry = {};

      const getLucide = () => window.LucideReact || window.lucide || {};

      const externalDeps = {
        react: window.React,
        'react-dom': window.ReactDOM,
        'lucide-react': getLucide(),
        lucide: getLucide(),
      };
      function ensureRoot() {
        if (!root) {
          const rootEl =
            document.getElementById('root') ||
            document.body.appendChild(Object.assign(document.createElement('div'), { id: 'root' }));
          root = ReactDOM.createRoot(rootEl);
        }
      }

      window.setActiveFile = (path) => {
        if (!window.AppCore.render(path)) {
          return;
        }

        try {
          if (window.moduleRegistry[path]) window.moduleRegistry[path].wasExecuted = false;
          const mod = customRequire(path);
          window.AppCore.ensureRoot();
          root.render(window.React.createElement(mod.default || mod));
        } catch (err) {
          reportError(err);
        }
      };

      // =========================================================================
      // 4. MESSAGE BUS & BOOTSTRAP
      // =========================================================================
      window.addEventListener('message', ({ data }) => {
        if (!data?.type) return;
        switch (data.type) {
          case 'vfs:update':
            if (data.entryPoint) ENTRY_PATH = data.entryPoint;

            // Use the helper
            window.AppCore.syncRegistry(data.files);
            window.vfs = data.files;

            // Use the helper
            if (AppCore.render(ENTRY_PATH)) {
              window.parent.postMessage({ type: 'iframe:success' }, '*');
            }
            break;

          case 'vfs:active-file-change':
            if (data.entryPoint) ENTRY_PATH = data.entryPoint;
            window.AppCore.render(data.path);
            break;

          case 'theme':
            document.documentElement.dataset.theme = data.theme;
            document.body.style.background = data.theme === 'dark' ? '#0b0b0f' : '#ffffff';
            break;
        }
      });
      window.addEventListener('error', (e) => reportError(e));
    </script>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        window.LucideReact = window.lucide;
        console.log('Environment Ready');

        // Notify parent we are ready to receive messages
        window.parent.postMessage({ type: 'iframe:ready' }, '*');
      });
    </script>
  </body>
</html>
