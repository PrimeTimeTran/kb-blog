<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://cdn.jsdelivr.net/npm/fuse.js/dist/fuse.min.js"></script>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
    />

    <!-- your globals -->
    <script src="/react.js"></script>
    <script src="/reactdom.js"></script>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }

      :root {
        /* ✅ keep RGB channels only (correct format for Tailwind alpha) */
        --bg: 255 255 255;
        --fg: 15 15 15;
        /* optional extra tokens for your UI system */
        --muted: 120 120 120;
        --accent: 34 197 94;
      }

      :root[data-theme='dark'] {
        --bg: 9 9 11;
        --fg: 255 255 255;
        --muted: 161 161 170;
        --accent: 59 130 246;
      }

      body {
        background: rgb(var(--bg));
        color: rgb(var(--fg));
        transition:
          background 0.2s ease,
          color 0.2s ease;
      }

      /* 🔥 IMPORTANT: enables Tailwind rgb(var(--x) / alpha) usage smoothly */
      #root {
        color-scheme: dark light;
      }
      /* Error Overlay Design - Saves DOM structure from destruction */
      #error-overlay {
        position: fixed;
        inset: 0;
        background: rgba(9, 9, 11, 0.95);
        color: #ef4444;
        padding: 24px;
        font-family: monospace;
        font-size: 14px;
        line-height: 1.5;
        overflow: auto;
        z-index: 99999;
        display: none;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <div id="error-overlay"></div>
    <script>
      // =========================
      // STATE
      // =========================
      let root = null;
      let latestCode = null;

      function ensureRoot() {
        const rootEl = document.getElementById('root');
        if (!rootEl) {
          const newRoot = document.createElement('div');
          newRoot.id = 'root';
          document.body.appendChild(newRoot);
        }
        if (!root) {
          root = ReactDOM.createRoot(document.getElementById('root'));
        }
      }

      window.React = React;
      window.ReactDOM = ReactDOM;

      // =========================
      // THEME
      // =========================
      function applyTheme(theme) {
        document.documentElement.dataset.theme = theme;
        document.body.style.background = theme === 'dark' ? '#0b0b0f' : '#ffffff';
      }

      // =========================
      // ERROR PARSER & TRANSMITTER
      // =========================
      function handleIframeError(err) {
        console.error('[IFRAME RUNTIME EXCEPTION]', err);

        const rawMessage = err.message || String(err);
        const rawStack = err.stack || '';

        window.parent.postMessage(
          {
            type: 'iframe:error',
            payload: {
              message: rawMessage,
              stack: rawStack,
              loc: err.loc || null,
            },
          },
          '*',
        );
      }

      function notifySuccess() {
        window.parent.postMessage({ type: 'iframe:success' }, '*');
      }

      // Modern event captures to route tracking cleanly
      window.addEventListener('error', (e) => {
        e.preventDefault();
        handleIframeError(e.error || new Error(e.message));
      });

      window.addEventListener('unhandledrejection', (e) => {
        e.preventDefault();
        handleIframeError(e.reason instanceof Error ? e.reason : new Error(e.reason));
      });

      // =========================
      // CODE RENDER
      // =========================
      function render(code) {
        try {
          if (!code) return;

          const transformed = Babel.transform(code, {
            presets: ['react'],
          }).code;

          eval(transformed);

          if (typeof App === 'function' && !window.App) {
            window.App = App;
          }

          const TargetApp = typeof window.App === 'function' ? window.App : typeof App === 'function' ? App : null;

          if (!TargetApp) {
            throw new Error('App is not defined. Make sure your preview file contains an "App" component entry point.');
          }

          ensureRoot();
          root.render(React.createElement(TargetApp));

          notifySuccess();
        } catch (err) {
          handleIframeError(err);
        }
      }

      // =========================
      // MESSAGE BUS
      // =========================
      window.addEventListener('message', (e) => {
        const data = e.data;

        if (data?.type === 'theme') {
          applyTheme(data.theme);
        }

        if (data?.type === 'code:update') {
          render(data.code);
        }
      });

      // =========================
      // BOOT
      // =========================
      window.parent.postMessage({ type: 'iframe:ready' }, '*');
      console.log('[IFRAME BOOTED]');
    </script>
  </body>
</html>
