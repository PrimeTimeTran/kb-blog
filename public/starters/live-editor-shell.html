<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- React -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- Babel (only if you still eval JSX in browser) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- libs -->
    <script src="https://cdn.jsdelivr.net/npm/fuse.js/dist/fuse.min.js"></script>

    <!-- your globals -->
    <script src="/react.js"></script>
    <script src="/reactdom.js"></script>
    <script src="/lucide.js"></script>

    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }

      :root {
        --bg: 255 255 255;
        --fg: 15 15 15;
      }

      :root[data-theme='dark'] {
        --bg: 9 9 11;
        --fg: 255 255 255;
      }

      body {
        background: rgb(var(--bg));
        color: rgb(var(--fg));
        transition: background 0.2s ease;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>

    <script>
      // =========================
      // STATE
      // =========================

      let root = null;
      let latestCode = null;

      function ensureRoot() {
        if (!root) {
          root = ReactDOM.createRoot(document.getElementById('root'));
        }
      }

      // expose globals
      window.React = React;
      window.ReactDOM = ReactDOM;

      // IMPORTANT: icons
      window.Icon = window.lucide;

      // =========================
      // THEME
      // =========================

      function applyTheme(theme) {
        document.documentElement.dataset.theme = theme;

        document.body.style.background = theme === 'dark' ? '#0b0b0f' : '#ffffff';
      }

      // =========================
      // CODE RENDER
      // =========================

      function render(code) {
        try {
          if (!code) return;

          const transformed = Babel.transform(code, {
            presets: ['react'],
          }).code;

          eval(transformed);

          if (typeof App !== 'function') {
            throw new Error('App is not defined');
          }

          ensureRoot();

          root.render(React.createElement(App));
        } catch (err) {
          console.error('[IFRAME ERROR]', err);

          document.body.innerHTML = '<pre style="color:red;padding:16px;">' + (err.stack || err) + '</pre>';
        }
      }

      // =========================
      // MESSAGE BUS
      // =========================

      window.addEventListener('message', (e) => {
        const data = e.data;

        if (data?.type === 'theme') {
          applyTheme(data.theme);
        }

        if (data?.type === 'code:update') {
          render(data.code);
        }
      });

      // =========================
      // BOOT
      // =========================

      window.parent.postMessage({ type: 'iframe:ready' }, '*');

      console.log('[IFRAME BOOTED]');
    </script>
  </body>
</html>
