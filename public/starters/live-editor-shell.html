<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js/dist/fuse.min.js"></script>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
    />

    <!-- your globals -->
    <script src="/react.js"></script>
    <script src="/reactdom.js"></script>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }

      :root {
        /* ✅ keep RGB channels only (correct format for Tailwind alpha) */
        --bg: 255 255 255;
        --fg: 15 15 15;
        /* optional extra tokens for your UI system */
        --muted: 120 120 120;
        --accent: 34 197 94;
      }

      :root[data-theme='dark'] {
        --bg: 9 9 11;
        --fg: 255 255 255;
        --muted: 161 161 170;
        --accent: 59 130 246;
      }

      body {
        background: rgb(var(--bg));
        color: rgb(var(--fg));
        transition:
          background 0.2s ease,
          color 0.2s ease;
      }

      /* 🔥 IMPORTANT: enables Tailwind rgb(var(--x) / alpha) usage smoothly */
      #root {
        color-scheme: dark light;
      }
      /* Error Overlay Design - Saves DOM structure from destruction */
      #error-overlay {
        position: fixed;
        inset: 0;
        background: rgba(9, 9, 11, 0.95);
        color: #ef4444;
        padding: 24px;
        font-family: monospace;
        font-size: 14px;
        line-height: 1.5;
        overflow: auto;
        z-index: 99999;
        display: none;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <div id="error-overlay"></div>
    <script src="https://unpkg.com/lucide-react@latest/dist/umd/lucide-react.js" onload="initLucide()"></script>

    <script>
      function initLucide() {
        // Now window.lucide is guaranteed to exist
        window.LucideReact = window.lucide;
        console.log('Lucide initialized:', window.LucideReact);
      }
    </script>

    <script src="https://unpkg.com/lucide-react@latest/dist/umd/lucide-react.js" onload="verifyLucide()"></script>

    <script>
      function verifyLucide() {
        // Check possible locations for the library
        window.LucideReact = window.lucide || window.Lucide || window.LucideReact;

        if (window.LucideReact) {
          console.log('Lucide successfully mapped to:', window.LucideReact);
        } else {
          console.error('Could not find Lucide on window object!');
        }
      }
    </script>

    <script>
      // =========================================================================
      // 1. CONFIGURATION & STATE
      // =========================================================================
      let ENTRY_PATH = './hello-world/page.tsx';
      let root = null;
      window.moduleRegistry = {};

      const getLucide = () => window.LucideReact || window.lucide || {};

      const externalDeps = {
        react: window.React,
        'react-dom': window.ReactDOM,
        'lucide-react': getLucide(),
        lucide: getLucide(),
      };

      // =========================================================================
      // 2. CORE MODULE SYSTEM
      // =========================================================================
      function customRequire(modulePath) {
        if (!modulePath) return {};

        // Check External Deps first
        if (externalDeps[modulePath]) return externalDeps[modulePath];

        // Normalize path for lookup
        const normalized = modulePath.replace(/^\.\//, '');
        const registryKey = Object.keys(window.moduleRegistry).find(
          (k) => k.endsWith(normalized) || k.endsWith(normalized + '.tsx'),
        );

        const mod = window.moduleRegistry[registryKey];
        if (!mod) {
          throw new Error(`Cannot resolve module: '${modulePath}'`);
        }

        if (!mod.wasExecuted) {
          mod.factory(mod.exports, customRequire, mod);
          mod.wasExecuted = true;
        }
        return mod.exports;
      }

      // =========================================================================
      // 3. RENDER ENGINE
      // =========================================================================
      function ensureRoot() {
        if (!root) {
          const rootEl =
            document.getElementById('root') ||
            document.body.appendChild(Object.assign(document.createElement('div'), { id: 'root' }));
          root = ReactDOM.createRoot(rootEl);
        }
      }

      window.setActiveFile = (path) => {
        if (!window.vfs?.[path]) return;

        try {
          if (window.moduleRegistry[path]) window.moduleRegistry[path].wasExecuted = false;
          const mod = customRequire(path);
          ensureRoot();
          root.render(window.React.createElement(mod.default || mod));
        } catch (err) {
          handleIframeError(err);
        }
      };

      // =========================================================================
      // 4. MESSAGE BUS & BOOTSTRAP
      // =========================================================================
      window.addEventListener('message', ({ data }) => {
        if (!data?.type) return;

        if (data.type === 'vfs:update') {
          if (data.entryPoint) ENTRY_PATH = data.entryPoint;
          window.moduleRegistry = {};

          Object.entries(data.files || {}).forEach(([path, file]) => {
            const transformed = Babel.transform(file.content, {
              presets: ['react', 'env'],
              plugins: ['transform-modules-commonjs'],
            }).code;

            window.moduleRegistry[path] = {
              exports: {},
              factory: new Function('exports', 'require', 'module', transformed),
              wasExecuted: false,
            };
          });

          window.vfs = data.files;
          const mod = customRequire(ENTRY_PATH);
          ensureRoot();
          root.render(window.React.createElement(mod.default || mod));
          window.parent.postMessage({ type: 'iframe:success' }, '*');
        }

        if (data.type === 'vfs:active-file-change') {
          if (data.entryPoint) ENTRY_PATH = data.entryPoint;
          window.setActiveFile(data.path);
        }

        if (data?.type === 'theme') {
          function applyTheme(theme) {
            document.documentElement.dataset.theme = theme;
            document.body.style.background = theme === 'dark' ? '#0b0b0f' : '#ffffff';
          }
          applyTheme(data.theme);
        }
      });

      window.parent.postMessage({ type: 'iframe:ready' }, '*');
      // Error handling remains same...
      window.addEventListener('error', (e) => handleIframeError(e.error));
    </script>
  </body>
</html>
